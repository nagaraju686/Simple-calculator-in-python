<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ol type="i" start="2" >
        <li>html</li>
        <li>css</li>
        <li>javascript</li>
        <li>typescript</li>
        <li>python</li>
        <li>java</li>
    </ol>

<ul type="circle">
    <li>html</li>
    <li>css</li>
    <li>javascript</li>
    <li>python</li>
    <li>java</li>
</ul>

<ul type="square">
    <li>html</li>
    <li>css</li>
    <li>javascript</li>
    <li>python</li>
    <li>java</li>
</ul>
<ul type="disc">
    <li>html</li>
    <li>css</li>
    <li>javascript</li>
    <li>python</li>
    <li>java</li>
</ul>

<dl>
    <dt>html</dt>
    <dd>html</dd>
</dl>
</body>
</html>
